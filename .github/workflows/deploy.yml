name: Deploy AI Backend (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          set -x   # show commands
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          echo "---- SSH FILES ----"
          ls -la ~/.ssh

      - name: Test SSH Connection (DEBUG)
        run: |
          set -x
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -v ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo ✅ SSH connected"

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'

            set -ex   # VERY IMPORTANT: show commands + fail on error

            echo "🚀 Starting deployment..."

            echo "👤 Current user:"
            whoami

            echo "📁 Current dir:"
            pwd

            echo "📂 Listing /var/www:"
            ls -la /var/www

            # -------------------------
            # FASTAPI APP
            # -------------------------
            cd /var/www/ai-backend

            echo "📂 Project files:"
            ls -la

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "🐍 Checking venv..."
            ls -la venv || echo "❌ venv missing"

            echo "📦 Installing dependencies..."
            /var/www/ai-backend/venv/bin/pip install -r requirements.txt

            echo "📊 PM2 before restart:"
            /usr/bin/pm2 list

            echo "🔁 Restarting FastAPI..."
            /usr/bin/pm2 restart fastapi-app || /usr/bin/pm2 start "/var/www/ai-backend/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" --name fastapi-app --cwd /var/www/ai-backend

            echo "📊 PM2 after restart:"
            /usr/bin/pm2 list

            echo "📜 Last logs:"
            /usr/bin/pm2 logs fastapi-app --lines 20 || true

            echo "✅ Deployment successful!"

          EOF