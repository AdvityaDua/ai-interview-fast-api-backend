name: Deploy AI Backend (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write key safely
          printf "%s\n" "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "---- KEY HEADER/FOOTER CHECK ----"
          head -1 ~/.ssh/id_ed25519
          tail -1 ~/.ssh/id_ed25519

          ssh-keygen -l -f ~/.ssh/id_ed25519 && echo "✅ Key is valid" || echo "❌ Key is INVALID"

          ssh-keyscan -T 10 -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>&1

      - name: Test SSH Connection
        run: |
          ssh -v \
            -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            "echo '✅ SSH connected as:' && whoami"

      - name: Deploy to VM
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" \
            'bash -s' << 'ENDSSH'

            set -ex

            echo "🚀 Starting deployment..."
            echo "👤 User: $(whoami)"
            echo "📁 Dir:  $(pwd)"
            echo "📂 /var/www:" && ls -la /var/www

            cd /var/www/ai-backend

            echo "📥 Pulling latest code..."
            git config --global --add safe.directory /var/www/ai-backend
            git pull origin main

            echo "🐍 Checking venv..."
            if [ ! -d venv ]; then
              echo "❌ venv missing — creating one..."
              python3 -m venv venv
            fi

            echo "📦 Installing dependencies..."
            /var/www/ai-backend/venv/bin/pip install -r requirements.txt

            echo "📊 PM2 before restart:"
            /usr/bin/pm2 list

            echo "🔁 Restarting FastAPI..."
            /usr/bin/pm2 restart fastapi-app || /usr/bin/pm2 start \
              "/var/www/ai-backend/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" \
              --name fastapi-app \
              --cwd /var/www/ai-backend

            echo "📊 PM2 after restart:"
            /usr/bin/pm2 list

            echo "📜 Logs:"
            /usr/bin/pm2 logs fastapi-app --lines 20 --nostream || true

            echo "✅ Deployment complete!"

          ENDSSH